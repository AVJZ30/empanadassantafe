<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opiniones | Empanadas Santa Fe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SDK DE SUPABASE AÑADIDO AQUÍ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #F6C319; --secondary: #32104A; --bg-color: #FAFAFA; --text-color: #333333; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 80px 5% 40px; font-family: 'Poppins', sans-serif;}
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Sistema de Empanadas Calificadoras */
        .empanada-rating { display: flex; gap: 10px; cursor: pointer; font-size: 2rem; margin: 10px 0; }
        .empanada-icon { color: #ccc; transition: transform 0.2s, color 0.3s; }
        .empanada-icon.active { color: var(--primary); transform: scale(1.2); }

        .review-form { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Poppins', sans-serif; }
        .btn-submit { background: var(--secondary); color: white; padding: 12px 25px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;}
        .btn-submit:hover { background: var(--primary); color: var(--secondary); }
        
        .nav-btn { display: inline-block; margin-bottom: 20px; color: var(--secondary); font-weight: bold; text-decoration: none; }
        .nav-btn:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-btn"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a>
        <h1>Lo que dicen nuestros clientes</h1>
        
        <div class="review-form">
            <h3>¡Califícanos con empanadas!</h3>
            <div class="empanada-rating" id="ratingContainer">
                <i class="fa-solid fa-cookie empanada-icon" data-value="1"></i>
                <i class="fa-solid fa-cookie empanada-icon" data-value="2"></i>
                <i class="fa-solid fa-cookie empanada-icon" data-value="3"></i>
                <i class="fa-solid fa-cookie empanada-icon" data-value="4"></i>
                <i class="fa-solid fa-cookie empanada-icon" data-value="5"></i>
            </div>
            <input type="hidden" id="selectedRating" value="5">
            <div class="form-group">
                <input type="text" id="reviewerName" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <textarea id="reviewerComment" rows="3" placeholder="Tu opinión..."></textarea>
            </div>
            <button class="btn-submit" onclick="submitReview()">Publicar Opinión</button>
        </div>
    </div>

    <script>
        // === 1. INICIALIZACIÓN DE SUPABASE ===
        const SUPABASE_URL = 'https://oqmhoqvkbdfaqvsjarxx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yPL8mNoPzJYRt0BBdpJ4-Q_dbwgj6wH';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // === 2. Lógica de las empanadas (Estrellas) ===
        let currentRating = 5;
        const icons = document.querySelectorAll('.empanada-icon');
        
        icons.forEach(icon => {
            icon.addEventListener('click', () => {
                currentRating = icon.getAttribute('data-value');
                document.getElementById('selectedRating').value = currentRating;
                updateRatingUI(currentRating);
            });
        });

        function updateRatingUI(rating) {
            icons.forEach(i => {
                i.classList.toggle('active', i.getAttribute('data-value') <= rating);
            });
        }
        updateRatingUI(5); // Inicializa con 5 empanadas

        // === 3. Guardar en Base de Datos ===
        async function submitReview() {
            const nombre = document.getElementById('reviewerName').value;
            const comentario = document.getElementById('reviewerComment').value;
            const rating = document.getElementById('selectedRating').value;

            if(!nombre || !comentario) return alert("Por favor, completa todos los campos.");
            
            // Reemplaza 'opiniones' por el nombre exacto de tu tabla en Supabase
            const { data, error } = await supabase
                .from('opiniones') 
                .insert([
                    { nombre: nombre, comentario: comentario, rating: parseInt(rating) }
                ]);

            if (error) {
                console.error('Error insertando en Supabase:', error);
                alert("Hubo un error al enviar tu opinión. Intenta de nuevo.");
            } else {
                alert(`¡Gracias ${nombre}! Calificaste con ${rating} empanadas. Tu opinión ha sido guardada.`);
                // Resetear campos
                document.getElementById('reviewerName').value = '';
                document.getElementById('reviewerComment').value = '';
                updateRatingUI(5);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
    <title>Menú | Empanadas Santa Fe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #F6C319; --secondary: #32104A; --accent: #C7A8E9; --bg-color: #FAFAFA; --text-color: #333333; --glass-bg: rgba(255, 255, 255, 0.7); --glass-border: rgba(255, 255, 255, 0.3); }
        [data-theme="dark"] { --bg-color: #12091A; --text-color: #F0F0F0; --glass-bg: rgba(50, 16, 74, 0.4); --glass-border: rgba(199, 168, 233, 0.1); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-top: 80px; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 1rem 5%; background: var(--glass-bg); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--secondary); text-decoration: none; }
        
        /* Animación en Volver al Inicio */
        .back-link {
            font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-color); transition: transform 0.3s ease, color 0.3s ease;
        }
        .back-link:hover { transform: translateX(-5px); color: var(--primary); }
        
        .menu-container { padding: 20px 5% 80px; max-width: 1200px; margin: 0 auto; }
        .category-title { font-size: 2rem; color: var(--secondary); margin: 30px 0 20px; border-bottom: 2px solid var(--primary); display: inline-block; }
        [data-theme="dark"] .category-title { color: var(--accent); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .product-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 20px; text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s ease;
        }
        .product-card:hover { transform: translateY(-5px); }
        .badge { position: absolute; top: 15px; right: -25px; background: var(--secondary); color: white; padding: 5px 30px; transform: rotate(45deg); font-size: 0.8rem; font-weight: bold; }
        .product-img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; background: #eee; }
        .product-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
        .product-price { color: var(--secondary); font-weight: 700; font-size: 1.3rem; margin-bottom: 15px; }
        [data-theme="dark"] .product-price { color: var(--primary); }
        
        .add-btn { background: var(--primary); color: var(--secondary); border: none; padding: 10px 20px; border-radius: 25px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }
        .add-btn:hover { background: var(--secondary); color: var(--primary); }

        .cart-float-btn {
            position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px;
            background: var(--secondary); color: var(--primary); border-radius: 50% 50% 0 50%;
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem;
            cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 1000; transition: 0.3s;
        }
        .cart-float-btn:hover { transform: scale(1.1); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--primary); color: var(--secondary); width: 25px; height: 25px; border-radius: 50%; font-size: 0.9rem; font-weight: bold; display: flex; justify-content: center; align-items: center; }

        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh;
            background: var(--bg-color); box-shadow: -5px 0 20px rgba(0,0,0,0.2); z-index: 1001;
            padding: 20px; display: flex; flex-direction: column; transition: right 0.4s ease;
        }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        .close-cart { font-size: 1.5rem; cursor: pointer; color: red; }
        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--glass-bg); padding: 10px; border-radius: 10px; }
        .cart-item-controls button { width: 30px; height: 30px; border: none; background: var(--primary); border-radius: 5px; cursor: pointer; font-weight: bold; }
        .cart-footer { border-top: 1px solid #ccc; padding-top: 20px; }
        .total-price { font-size: 1.5rem; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 15px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--secondary); color: white; padding: 10px 20px; border-radius: 30px; transition: 0.3s; z-index: 10000; opacity: 0; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (max-width: 480px) {
            .cart-sidebar { max-width: 100%; } /* Carrito ocupa toda la pantalla en móviles pequeños */
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Santa Fe</a>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a>
    </nav>

    <div class="menu-container" id="menu-container"></div>

    <div class="cart-float-btn" id="open-cart">
        <i class="fa-solid fa-cart-shopping"></i>
        <div class="cart-count" id="cart-count">0</div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Tu Pedido</h2>
            <i class="fa-solid fa-times close-cart" id="close-cart"></i>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="total-price">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="clearCart()" style="width: 100%; margin-top: 10px; padding: 10px; background: none; border: 1px solid red; color: red; border-radius: 20px; cursor: pointer; font-weight: bold;">Vaciar Carrito</button>
        </div>
    </div>

    <div class="toast" id="toast">¡Agregado al carrito!</div>

    <script>
        if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        // 👉 AQUÍ REEMPLAZA EL TEXTO "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" POR EL LINK REAL DE CADA FOTO
        const productsDB = [
            { id: 1, category: "Combos", name: "Jugo + Empanada Carne", price: 1.00, tag: "Popular", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 2, category: "Combos", name: "Jugo + Empanada Jamón y Queso", price: 1.00, tag: "", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 3, category: "Empanadas", name: "Texana de Pollo", price: 1.00, tag: "Más Vendido", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 4, category: "Empanadas", name: "Mechada de Pollo", price: 1.00, tag: "", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 5, category: "Empanadas", name: "Pizza", price: 1.00, tag: "", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 6, category: "Empanadas", name: "Temblor", price: 1.00, tag: "", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 7, category: "Empanadas", name: "Parrilla", price: 1.30, tag: "Nuevo", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 8, category: "Empanadas", name: "Platillo Espacial", price: 1.50, tag: "Especial", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 9, category: "Jugos", name: "Jugo Pequeño", price: 0.40, tag: "", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 10, category: "Jugos", name: "Jugo Mediano", price: 0.60, tag: "", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" },
            { id: 11, category: "Jugos", name: "Jugo Grande", price: 1.00, tag: "", img: "👉 PEGA_AQUÍ_TU_ENLACE_DE_PINTEREST" }
        ];

        let cart = JSON.parse(localStorage.getItem('santafe_cart')) || [];

        function renderMenu() {
            const container = document.getElementById('menu-container');
            const categories = [...new Set(productsDB.map(p => p.category))];
            
            categories.forEach(cat => {
                container.innerHTML += `<h2 class="category-title">${cat}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'products-grid';
                
                const catProducts = productsDB.filter(p => p.category === cat);
                catProducts.forEach(prod => {
                    grid.innerHTML += `
                        <div class="product-card">
                            ${prod.tag ? `<div class="badge">${prod.tag}</div>` : ''}
                            <img src="${prod.img}" alt="${prod.name}" class="product-img">
                            <h3 class="product-name">${prod.name}</h3>
                            <p class="product-price">$${prod.price.toFixed(2)}</p>
                            <button class="add-btn" onclick="addToCart(${prod.id})">Agregar al Carrito</button>
                        </div>
                    `;
                });
                container.appendChild(grid);
            });
        }

        function saveCart() { localStorage.setItem('santafe_cart', JSON.stringify(cart)); updateCartUI(); }

        function addToCart(id) {
            const product = productsDB.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) { existing.qty++; } else { cart.push({ ...product, qty: 1 }); }
            showToast(); saveCart();
        }

        function updateQty(id, change) {
            const index = cart.findIndex(item => item.id === id);
            if (index !== -1) {
                cart[index].qty += change;
                if (cart[index].qty <= 0) cart.splice(index, 1);
                saveCart();
            }
        }

        function clearCart() { cart = []; saveCart(); }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            itemsContainer.innerHTML = '';
            let total = 0; let count = 0;

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                total += subtotal; count += item.qty;
                itemsContainer.innerHTML += `
                    <div class="cart-item">
                        <div style="flex:1;">
                            <h4 style="font-size:0.9rem; margin-bottom: 5px;">${item.name}</h4>
                            <small>$${item.price.toFixed(2)} c/u</small>
                        </div>
                        <div class="cart-item-controls" style="display:flex; align-items:center; gap:10px;">
                            <button onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });

            totalEl.innerText = `$${total.toFixed(2)}`;
            countEl.innerText = count;
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.getElementById('open-cart').addEventListener('click', () => document.getElementById('cart-sidebar').classList.add('open'));
        document.getElementById('close-cart').addEventListener('click', () => document.getElementById('cart-sidebar').classList.remove('open'));

        renderMenu(); updateCartUI();
    </script>
</body>
</html>
